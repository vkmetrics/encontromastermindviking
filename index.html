<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastermind Viking</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;
  --surface:#111;
  --surface2:#181818;
  --surface3:#1f1f1f;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#f0ede6;
  --muted:#888;
  --muted2:#444;
  --accent:#7b5cf0;
  --accent2:#9d7ff5;
  --accent-dim:rgba(123,92,240,0.1);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;font-weight:300;line-height:1.6}

/* MAIN LAYOUT — full height, no scroll */
.page{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:2rem}

/* background grid */
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);pointer-events:none}
.bg-glow{position:absolute;top:30%;left:50%;transform:translateX(-50%);width:500px;height:400px;background:radial-gradient(circle,rgba(123,92,240,0.12) 0%,transparent 70%);pointer-events:none}

/* LOGO */
.logo-wrap{position:relative;z-index:1;margin-bottom:1.5rem;width:100%;display:flex;justify-content:center}
.logo-wrap img{height:130px;display:block}

/* EVENT INFO */
.event-info{position:relative;z-index:1;display:flex;gap:0;margin-bottom:2rem;align-items:center;justify-content:center;width:540px}
.event-info-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.event-info-label{font-size:0.62rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent2);font-weight:400}
.event-info-val{font-size:0.9rem;color:var(--text);font-weight:400}
.event-info-sep{width:1px;height:32px;background:var(--border2)}

/* CARDS */
.cards{position:relative;z-index:1;display:flex;gap:1px;background:var(--border2);border:1px solid var(--border2);width:540px}
.card{background:var(--surface);padding:2rem 0;cursor:pointer;transition:background 0.2s,border-color 0.2s;flex:1;text-align:center;border-bottom:2px solid transparent;user-select:none}
.card:hover{background:var(--surface2)}
.card.active{background:var(--surface2);border-bottom-color:var(--accent)}
.card-icon{font-size:1.6rem;display:block;margin-bottom:0.6rem}
.card-title{font-size:0.75rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--text)}
.card.active .card-title{color:var(--accent2)}

/* PANEL — slides up over the page */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;opacity:0;pointer-events:none;transition:opacity 0.3s}
.panel-overlay.open{opacity:1;pointer-events:all}
.panel{position:fixed;bottom:0;left:0;right:0;height:80vh;background:var(--surface);border-top:1px solid var(--border2);z-index:51;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column}
.panel.open{transform:translateY(0)}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.08em;color:var(--white);display:flex;align-items:center;gap:0.5rem}
.panel-title::before{content:'//';color:var(--accent)}
.panel-close{background:none;border:1px solid var(--border2);color:var(--muted);width:32px;height:32px;cursor:pointer;font-size:1rem;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.panel-close:hover{border-color:var(--accent);color:var(--accent2)}
.panel-body{flex:1;overflow-y:auto;padding:2rem;scrollbar-width:thin;scrollbar-color:var(--muted2) transparent}

/* EVENTO PANEL */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.info-card{background:var(--surface2);padding:1.75rem}
.info-card-icon{font-size:1.3rem;margin-bottom:0.75rem;display:block}
.info-card-label{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent2);margin-bottom:0.3rem;font-weight:400}
.info-card-val{font-size:0.95rem;color:var(--text);font-weight:400;line-height:1.5}
.info-card-note{font-size:0.75rem;color:var(--muted);margin-top:0.3rem;font-weight:300}

/* CRONOGRAMA PANEL */
.schedule{display:flex;flex-direction:column;gap:1px;background:var(--border)}
.day-block{background:var(--surface2)}
.day-header{padding:1.1rem 1.5rem;display:flex;align-items:center;gap:1rem;cursor:pointer;user-select:none;transition:background 0.2s}
.day-header:hover{background:var(--surface3)}
.day-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent);line-height:1;min-width:36px}
.day-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.06em;color:var(--text)}
.day-date{font-size:0.72rem;color:var(--muted);font-weight:300}
.day-chevron{margin-left:auto;color:var(--muted);transition:transform 0.3s}
.day-body{max-height:0;overflow:hidden;transition:max-height 0.4s ease,padding 0.3s;padding:0 1.5rem}
.day-body.open{max-height:500px;padding:0 1.5rem 1.25rem}
.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:1rem;padding:0.6rem 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-time{font-size:0.72rem;color:var(--accent2);font-weight:400;min-width:50px;padding-top:2px}
.tl-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.tl-title{font-size:0.85rem;color:var(--text);font-weight:400}
.tl-desc{font-size:0.72rem;color:var(--muted);font-weight:300}

/* PARTICIPANTES PANEL */
.part-search{width:100%;padding:0.7rem 1.1rem;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'Lato',sans-serif;font-size:0.85rem;outline:none;margin-bottom:1.25rem;transition:border-color 0.2s}
.part-search:focus{border-color:var(--accent)}
.part-search::placeholder{color:var(--muted)}
.part-tabs{display:flex;gap:1px;margin-bottom:1.25rem;background:var(--border)}
.tab-btn{padding:0.5rem 1.1rem;background:var(--surface2);border:none;color:var(--muted);font-family:'Lato',sans-serif;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.tab-btn.active{background:var(--surface3);color:var(--accent2)}
.tab-btn:hover:not(.active){background:var(--surface3)}
.part-count{font-size:0.72rem;color:var(--muted);margin-bottom:0.9rem}
.part-count span{color:var(--accent2)}
.part-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.part-card{background:var(--surface2);padding:1.25rem;display:flex;gap:1rem;align-items:flex-start;transition:background 0.2s}
.part-card:hover{background:var(--surface3)}
.part-avatar{flex-shrink:0;width:48px;height:48px;border-radius:50%;border:1px solid var(--border2);overflow:hidden;background:var(--surface3);display:flex;align-items:center;justify-content:center}
.part-avatar img{width:100%;height:100%;object-fit:cover}
.part-avatar-init{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted)}
.part-handle{font-size:0.65rem;letter-spacing:0.1em;color:var(--accent2);margin-bottom:0.1rem}
.part-name{font-size:0.88rem;font-weight:700;color:var(--text);margin-bottom:0.1rem;line-height:1.3}
.part-role{font-size:0.7rem;color:var(--muted);line-height:1.4;margin-bottom:0.4rem;font-weight:300}
.part-bio{font-size:0.72rem;color:rgba(240,237,230,0.4);line-height:1.6;font-style:italic;font-weight:300}
.hidden{display:none!important}

/* scrollbar */
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-track{background:transparent}
.panel-body::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}

@media(max-width:700px){
  html,body{overflow:auto}
  .page{height:auto;min-height:100vh;padding:2.5rem 1.25rem 6rem}
  .logo-wrap img{height:90px}
  .event-info{width:100%!important;max-width:340px}
  .cards{flex-direction:row;flex-wrap:wrap;width:100%!important;max-width:340px}
  .card{flex:1;min-width:100px;padding:1.25rem 0.5rem}
  .card-icon{font-size:1.2rem}
  .card-title{font-size:0.65rem;letter-spacing:0.1em}
  .panel{height:92vh}
  .event-info-val{font-size:0.8rem}
}
</style>
</head>

<template id="tpl-participantes">
  <input class="part-search" type="text" placeholder="Buscar por nome ou @..." id="searchInput" oninput="filterParts()">
  <p class="part-count">Exibindo <span id="vis-count">0</span> pessoas</p>
  <div class="part-grid" id="partGrid"></div>
</template>

<script>
const host = [];
const guests = [];

const all = [...host, ...guests];
let currentTab = 'all';
let activePanel = null;

const panels = {
  evento: {title:'O Evento', tpl:'tpl-evento'},
  cronograma: {title:'Cronograma', tpl:'tpl-cronograma'},
  participantes: {title:'Participantes', tpl:'tpl-participantes'},
};

function openPanel(id) {
  const cfg = panels[id];
  activePanel = id;
  document.getElementById('panel-title').textContent = cfg.title;
  const body = document.getElementById('panel-body');
  body.innerHTML = '';
  const tpl = document.getElementById(cfg.tpl);
  body.appendChild(document.importNode(tpl.content, true));

  if (id === 'participantes') buildParticipants();

  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');

  // highlight active card
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  activePanel = null;
}

function buildParticipants() {
  const grid = document.getElementById('partGrid');
  if (!grid) return;
  grid.innerHTML = all.map(p => {
    const ig = p.handle.replace('@','');
    const initials = p.name.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
    return `<div class="part-card" data-group="${p.group}" data-search="${(p.name+' '+p.role+' '+p.handle+' '+(p.bio||'')).toLowerCase()}">
      <div class="part-avatar">
        <img src="https://unavatar.io/instagram/${ig}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${p.name}" loading="lazy">
        <span class="part-avatar-init" style="display:none">${initials}</span>
      </div>
      <div>
        <div class="part-handle">${p.handle}</div>
        <div class="part-name">${p.name}</div>
        <div class="part-role">${p.role}</div>
        ${p.bio ? `<div class="part-bio">${p.bio}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function filterParts() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const cards = document.querySelectorAll('.part-card');
  let vis = 0;
  cards.forEach(c => {
    const ok = !q || c.dataset.search.includes(q);
    c.classList.toggle('hidden', !ok);
    if (ok) vis++;
  });
  const vc = document.getElementById('vis-count');
  if (vc) vc.textContent = vis;
}

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterParts();
}

function toggleDay(header) {
  const body = header.nextElementSibling;
  const chev = header.querySelector('.day-chevron');
  const open = body.classList.toggle('open');
  chev.style.transform = open ? 'rotate(180deg)' : '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
</script>
